name: Build and Release ImmortalWrt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # 每天北京时间12点 (UTC 4:00)

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for proper diffing

    - name: Sync upstream
      if: github.event_name == 'schedule'
      run: |
        git remote add upstream https://github.com/VIKINGYFY/immortalwrt.git
        git fetch upstream
        git merge upstream/master

    - name: Check Sync Status
      id: sync_status
      if: github.event_name == 'schedule'
      run: |
        if git diff --quiet HEAD^ HEAD; then
          echo "No changes after merge."
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected after merge."
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Push changes if any
      if: github.event_name == 'schedule' && steps.sync_status.outputs.has_changes == 'true'
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git push

    - name: Prepare Build Environment
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.sync_status.outputs.has_changes == 'true')
      run: |
        sudo apt update
        sudo apt upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gettext git libncurses5-dev libssl-dev \
        python3 rsync unzip zlib1g-dev file wget subversion binutils bzip2 diffutils findutils util-linux grep coreutils libc-dev libz-dev perl which
        python3-distutils rsync unzip zlib1g-dev file wget subversion

    - name: Download and Install Feeds
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.sync_status.outputs.has_changes == 'true')
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom .config
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.sync_status.outputs.has_changes == 'true')
      run: |
        # Ensure your custom .config file is in the root of your repository
        # For example, if your custom config is named 'my_router_config'
        # cp my_router_config .config
        # Or if it's named 'config_ax3600' and located in the root
        cp config_ax3600 .config
        # If you don't have a custom config, you can run 'make defconfig' instead
        # make defconfig

    - name: Compile Firmware
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.sync_status.outputs.has_changes == 'true')
      run: |
        make -j$(nproc) V=s

    - name: Upload Firmware to Release
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.sync_status.outputs.has_changes == 'true')
      uses: softprops/action-gh-release@v1
      with:
        files: | 
          bin/targets/*/*/*.bin
          bin/targets/*/*/*.elf
          bin/targets/*/*/*.img
          bin/targets/*/*/*.manifest
        name: ImmortalWrt Firmware Build ${{ github.ref_name }}-${{ github.run_number }}
        tag_name: build-${{ github.run_number }}
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}